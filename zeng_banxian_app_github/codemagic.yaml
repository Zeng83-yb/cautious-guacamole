workflows:
  flutter-workflow:
    name: Flutter Build Android Only
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Set Flutter version
        script: |
          flutter config --no-analytics
          flutter --version
      - name: Get dependencies
        script: |
          flutter pub get
      - name: Build Android APK
        script: |
          flutter build apk --debug
    triggers:
      push:
        branches:
          - main
    cache:
      cache_paths:
        - $HOME/.pub-cache
        - $HOME/.gradle/caches
    artifacts:
      - build/**/outputs/**/*.apk
