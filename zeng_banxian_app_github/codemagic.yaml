workflows:
     flutter-workflow:
       name: Flutter Android Build
       environment:
         flutter: stable
         xcode: latest
       scripts:
         - name: Installing dependencies
           script: |
             flutter pub get
         - name: Building APK
           script: |
             flutter build apk --debug
       artifacts:
         - build/**/outputs/**/*.apk
       cache:
         - $HOME/.pub-cache
         - $HOME/.gradle/caches
